<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nandan RCM Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:"Poppins",sans-serif;
}

body{
	min-height:100vh;
	background:url("images/login-bg.jpg") center/cover no-repeat;
	display:flex;
	align-items:center;
	justify-content:flex-end;
	padding-right:8%;
	overflow:hidden;
}

/* HOME BUTTON */

.home-btn{
	position:fixed;
	top:24px;
	left:24px;
	width:52px;
	height:52px;
	border-radius:14px;
	background:rgba(255,255,255,0.06);
	backdrop-filter:blur(5px);
	-webkit-backdrop-filter:blur(5px);
	border:1px solid rgba(255,255,255,0.14);
	display:flex;
	align-items:center;
	justify-content:center;
	color:#ffffff;
	font-size:20px;
	text-decoration:none;
	z-index:9999;
	box-shadow:0 10px 30px rgba(0,0,0,0.25);
	transition:0.3s ease;
}

.home-btn:hover{
	transform:translateY(-2px);
	background:rgba(255,255,255,0.10);
	box-shadow:0 14px 35px rgba(0,198,255,0.22);
}

/* GLASS PANEL */

.login-panel{
	width:400px;
	padding:30px 34px 28px;
	border-radius:24px;
	background:rgba(3,18,48,0.58);
	backdrop-filter:blur(10px);
	-webkit-backdrop-filter:blur(10px);
	border:1px solid rgba(255,255,255,0.18);
	box-shadow:
	0 25px 60px rgba(0,0,0,0.45),
	inset 0 1px 0 rgba(255,255,255,0.12);
}

/* HEADING */

.login-heading{
	text-align:center;
	margin-bottom:22px;
}

.login-heading h1{
	color:#ffffff;
	font-size:34px;
	font-weight:700;
	line-height:1.1;
	margin-bottom:8px;
}

.login-heading p{
	color:rgba(255,255,255,0.85);
	font-size:14px;
	font-weight:400;
}

/* INPUTS */

.input-box{
	position:relative;
	width:100%;
	margin-bottom:14px;
}

.input-box input{
	width:100%;
	height:52px;
	border-radius:13px;
	border:1px solid rgba(255,255,255,0.20);
	background:rgba(0,10,35,0.24);
	color:#ffffff;
	font-size:14px;
	padding:0 50px;
	outline:none;
}

.input-box input::placeholder{
	color:rgba(255,255,255,0.68);
}

.input-box i{
	position:absolute;
	top:50%;
	transform:translateY(-50%);
	color:rgba(255,255,255,0.88);
	font-size:22px;
}

.input-box .left-icon{
	left:22px;
}

.password-toggle{
	right:20px;
	cursor:pointer;
	font-size:20px !important;
	color:rgba(255,255,255,0.80) !important;
}

.password-toggle:hover{
	color:#ffb300 !important;
}

#countryCode{
	width:75px;
	height:52px;
	border-radius:13px;
	border:1px solid rgba(255,255,255,0.20);
	background:rgba(0,10,35,0.24);
	color:#ffffff;
	padding:0 12px;
	outline:none;
}

/* OTP */

#otp{
	display:none;
	width:100%;
	height:52px;
	border-radius:13px;
	border:1px solid rgba(255,255,255,0.20);
	background:rgba(0,10,35,0.24);
	color:#ffffff;
	font-size:14px;
	padding:0 20px;
	outline:none;
	margin:12px 0 15px;
}

#otp::placeholder{
	color:rgba(255,255,255,0.68);
}

/* RECAPTCHA */

#recaptcha-container{
	display:flex;
	justify-content:center;
	margin-bottom:15px;
	transform:scale(0.92);
	transform-origin:center;
}

/* OPTIONS */

.options{
	width:100%;
	display:flex;
	align-items:center;
	justify-content:space-between;
	margin:4px 0 18px;
}

.options label{
	display:flex;
	align-items:center;
	gap:10px;
	color:#ffffff;
	font-size:16px;
}

.options input{
	width:20px;
	height:20px;
	accent-color:#2f7cff;
}

.options a{
	color:#4d7dff;
	text-decoration:none;
	font-size:14px;
}

/* BUTTONS */

.login-btn{
	width:100%;
	height:50px;
	border:none;
	border-radius:13px;
	background:#ffb300;
	color:#06112b;
	font-size:18px;
	font-weight:700;
	cursor:pointer;
	margin-bottom:20px;
	transition:0.3s ease;
}

.login-btn:hover{
	transform:translateY(-2px);
}

/* DIVIDER */

.divider{
	width:100%;
	display:flex;
	align-items:center;
	gap:18px;
	color:#ffffff;
	font-size:16px;
	margin-bottom:20px;
}

.divider::before,
.divider::after{
	content:"";
	flex:1;
	height:1px;
	background:rgba(255,255,255,0.18);
}

/* GOOGLE */

.google-btn{
	width:100%;
	height:52px;
	border-radius:13px;
	border:1px solid rgba(255,255,255,0.20);
	background:rgba(0,10,35,0.14);
	color:#ffffff;
	font-size:17px;
	font-weight:500;
	display:flex;
	align-items:center;
	justify-content:center;
	gap:14px;
	cursor:pointer;
	margin-bottom:22px;
}

/* SIGNUP */

.signup{
	text-align:center;
	color:#ffffff;
	font-size:16px;
}

.signup a{
	color:#ffb300;
	text-decoration:none;
	font-weight:600;
	margin-left:8px;
}

/* MOBILE */

@media(max-width:900px){

	body{
		justify-content:center;
		padding:20px;
		overflow:auto;
	}

	.login-panel{
		width:100%;
		max-width:500px;
		padding:30px 22px 28px;
	}

	.options{
		flex-direction:column;
		align-items:flex-start;
		gap:10px;
	}
}

</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
	apiKey: "AIzaSyBdMTgzZGI10Bu3z4dm-ZUSumxN50H7UjE",
	authDomain: "nandan-rcm.firebaseapp.com",
	projectId: "nandan-rcm",
	appId: "1:418121831280:web:8f2eb7228971d0fbe7b5b5"
});

const auth = firebase.auth();
const db = firebase.firestore();

const superAdmins = [
	"vrprasad7@gmail.com",
	"raji202677@gmail.com",
	"nandanrcmsolutions@gmail.com"
];

const ADMIN_PAGE = "admin-dashboard-nandanrcm.html";
const STUDENT_PAGE = "student-dashboard.html";

async function redirectByRole(user){

	if(!user){
		window.location.href = STUDENT_PAGE;
		return;
	}

	const userEmail = (user.email || "").toLowerCase();

	if(superAdmins.includes(userEmail)){
		window.location.href = ADMIN_PAGE;
		return;
	}

	try{
		const adminDoc = await db.collection("admins").doc(user.uid).get();

		if(adminDoc.exists){
			window.location.href = ADMIN_PAGE;
		}else{
			window.location.href = STUDENT_PAGE;
		}

	}catch(error){
		console.log(error.message);
		window.location.href = STUDENT_PAGE;
	}
}
</script>

</head>

<body>

<a href="index.html" class="home-btn">
	<i class="fa-solid fa-house"></i>
</a>

<div class="login-panel">

	<div class="login-heading">
		<h1>Welcome Back!</h1>
		<p>Login to continue your learning journey</p>
	</div>

	<form onsubmit="return false;">

		<div style="display:flex; gap:10px; margin-bottom:14px;">

			<select id="countryCode">
				<option value="+91">🇮🇳 +91</option>
				<option value="+1">🇺🇸 +1</option>
				<option value="+44">🇬🇧 +44</option>
				<option value="+61">🇦🇺 +61</option>
			</select>

			<div class="input-box" style="margin-bottom:0; flex:1;">
				<i class="fa-regular fa-user left-icon"></i>
				<input type="text" id="loginInput" placeholder="Email or mobile number">
			</div>

		</div>

		<div class="input-box" id="passwordBox">
			<i class="fa-solid fa-lock left-icon"></i>
			<input type="password" id="password" placeholder="Password">
			<i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
		</div>

		<div id="recaptcha-container"></div>

		<div class="options">
			<label>
				<input type="checkbox" checked>
				Remember me
			</label>

			<a href="forgot-password.html" class="forgot-link">
				Forgot Password?
			</a>
		</div>

		<button type="button" class="login-btn" onclick="handleLogin()" id="loginBtn">
			Log In
		</button>

		<input type="text" id="otp" placeholder="Enter OTP">

		<button type="button"
			class="login-btn"
			id="verifyBtn"
			onclick="verifyOTP()"
			style="display:none;">
			Verify OTP
		</button>

		<div class="divider">or</div>

		<button type="button" class="google-btn" onclick="googleLogin()">

			<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
				 width="18">

			Continue with Google

		</button>

		<div class="signup">
			New user? <a href="signup.html">Sign Up</a>
		</div>

	</form>

</div>

<script>

/* PASSWORD SHOW / HIDE */
const passwordField = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

togglePassword.addEventListener("click", function(){

	const isHidden = passwordField.type === "password";

	passwordField.type = isHidden ? "text" : "password";

	this.classList.toggle("fa-eye", !isHidden);
	this.classList.toggle("fa-eye-slash", isHidden);

});

/* RECAPTCHA */
window.onload = function(){

	window.recaptchaVerifier =
	new firebase.auth.RecaptchaVerifier(
		"recaptcha-container",
		{
			size:"normal"
		}
	);

	window.recaptchaVerifier.render();
};

/* INPUT EVENTS */
document.getElementById("loginInput").addEventListener("input", function(){

	document.getElementById("otp").style.display = "none";
	document.getElementById("verifyBtn").style.display = "none";

});

/* LOGIN */
async function handleLogin(){

	const btn = document.getElementById("loginBtn");
	const input = document.getElementById("loginInput").value.trim();
	const password = document.getElementById("password").value;

	if(input === ""){
		alert("Please enter email or mobile number");
		return;
	}

	btn.innerText = "Processing...";
	btn.disabled = true;

	/* EMAIL LOGIN */
	if(input.includes("@")){

		if(password === ""){
			alert("Please enter password");
			btn.innerText = "Log In";
			btn.disabled = false;
			return;
		}

		try{
			const result =
			await auth.signInWithEmailAndPassword(input,password);

			const user = result.user;

			await redirectByRole(user);

		}catch(error){

			alert(error.message);

			btn.innerText = "Log In";
			btn.disabled = false;
		}

		return;
	}

	/* PHONE LOGIN */
	try{

		const phone = input.startsWith("+")
			? input
			: document.getElementById("countryCode").value + input;

		const result =
		await auth.signInWithPhoneNumber(
			phone,
			window.recaptchaVerifier
		);

		window.confirmationResult = result;

		alert("OTP Sent");

		document.getElementById("otp").style.display = "block";
		document.getElementById("verifyBtn").style.display = "block";

	}catch(error){

		alert(error.message);

	}finally{

		btn.innerText = "Log In";
		btn.disabled = false;
	}
}

/* VERIFY OTP */
async function verifyOTP(){

	if(!window.confirmationResult){
		alert("Please request OTP first");
		return;
	}

	const otp = document.getElementById("otp").value.trim();

	if(otp === ""){
		alert("Please enter OTP");
		return;
	}

	try{
		const result =
		await window.confirmationResult.confirm(otp);

		const user = result.user;

		await redirectByRole(user);

	}catch(error){
		alert("Invalid OTP");
	}
}

/* GOOGLE LOGIN */
async function googleLogin(){

	try{

		const provider =
		new firebase.auth.GoogleAuthProvider();

		const result =
		await auth.signInWithPopup(provider);

		const user = result.user;

		localStorage.setItem("studentName", user.displayName || "");
		localStorage.setItem("studentEmail", user.email || "");
		localStorage.setItem("studentPhoto", user.photoURL || "");

		await redirectByRole(user);

	}catch(error){

		alert(error.message);
	}
}
</script>

</body>
</html>
