<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nandan RCM Student Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:"Poppins",sans-serif; }

body{
  width:100%; height:100vh;
  background:
    radial-gradient(circle at top right,  rgba(0,198,255,.18), transparent 35%),
    radial-gradient(circle at bottom left, rgba(255,179,0,.12), transparent 32%),
    #000633;
  color:#fff; overflow:hidden;
}

#authGate{
  position:fixed; inset:0; background:#000633;
  display:flex; align-items:center; justify-content:center;
  z-index:99999; transition:opacity .4s;
}
#authGate.hide{ opacity:0; pointer-events:none; }
#authGate p{ color:rgba(255,255,255,.6); font-size:14px; }

#toast{
  position:fixed; bottom:30px; right:30px;
  background:linear-gradient(135deg,#00a85a,#2cff88);
  color:#000633; font-weight:700; font-size:14px;
  padding:12px 22px; border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  opacity:0; transform:translateY(12px);
  transition:.35s ease; pointer-events:none; z-index:9999;
}
#toast.show{ opacity:1; transform:translateY(0); }

.dashboard{
  display:flex; gap:12px;
  padding:25px 6px 6px 10px;
  transform:scale(.94); transform-origin:top left;
  width:106%; height:106%;
}

/* SIDEBAR */
.sidebar{
  width:220px; margin-top:14px;
  height:calc(100vh - 30px);
  background:rgba(1,14,41,.72);
  border:1px solid rgba(0,198,255,.28);
  border-radius:18px; padding:16px 12px;
  display:flex; flex-direction:column;
  box-shadow:0 0 28px rgba(0,198,255,.12);
  flex-shrink:0;
}
.logo{ text-align:center; padding-bottom:14px; margin-bottom:12px; border-bottom:1px solid rgba(255,255,255,.12); }
.logo h1{ font-size:26px; font-weight:700; letter-spacing:.5px; line-height:1.1; display:flex; align-items:center; justify-content:center; gap:7px; }
.logo .nandan{ color:#fff; }
.logo .rcm{ color:#ffb300; }
.logo p{ font-size:13px; font-weight:600; letter-spacing:2px; color:#fff; }

.nav-item{ height:39px; display:flex; align-items:center; gap:11px; padding:0 12px; border-radius:10px; margin-bottom:6px; color:#fff; font-size:13px; cursor:pointer; transition:.3s; }
.nav-item i{ color:#00c6ff; width:18px; }
.nav-item.active, .nav-item:hover{ background:rgba(0,198,255,.16); box-shadow:inset 4px 0 #ffb300; }

.student-profile{ margin-top:auto; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:10px; display:flex; align-items:center; gap:10px; }
.avatar{ width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#ffb300,#00c6ff); display:flex; align-items:center; justify-content:center; color:#000633; font-weight:800; }
.student-profile h4{ font-size:13px; }
.student-profile p{ font-size:11px; color:rgba(255,255,255,.65); }

/* MAIN */
.main{ flex:1; height:calc(100vh - 0px); padding:8px 4px 8px 0; overflow-y:auto; margin-top:14px;
  scrollbar-width:thin; scrollbar-color:rgba(0,198,255,.2) transparent; }
.main::-webkit-scrollbar{ width:4px; }
.main::-webkit-scrollbar-thumb{ background:rgba(0,198,255,.2); border-radius:4px; }

.topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.topbar h1{ font-size:24px; font-weight:700; }
.topbar p{ font-size:13px; color:rgba(255,255,255,.72); margin-top:4px; }
.logout-btn{ border:none; background:linear-gradient(90deg,#ffb300,#ffd76a); color:#000633; padding:10px 24px; border-radius:12px; font-weight:800; cursor:pointer; box-shadow:0 10px 24px rgba(255,179,0,.24); }

/* STATS */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
.stat-card{ height:80px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:15px; padding:13px; display:flex; align-items:center; gap:12px; }
.stat-icon{ width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:19px; }
.blue  { background:linear-gradient(135deg,#006dff,#00c6ff); }
.green { background:linear-gradient(135deg,#00a85a,#2cff88); }
.orange{ background:linear-gradient(135deg,#ff8c00,#ffb300); }
.purple{ background:linear-gradient(135deg,#7c3aed,#c084fc); }
.stat-card h2{ font-size:28px; line-height:1; }
.stat-card p{ font-size:11.5px; color:rgba(255,255,255,.70); }

/* FEATURE ROW */
.feature-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.feature-card{ height:108px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:17px; padding:16px; display:flex; align-items:center; justify-content:space-between; }
.feature-card h3{ font-size:18px; margin-bottom:5px; }
.feature-card p{ font-size:11.5px; line-height:1.4; color:rgba(255,255,255,.70); margin-bottom:5px; }
.feature-card a{ color:#ffb300; text-decoration:none; font-weight:700; font-size:12.5px; }
.feature-icon{ font-size:42px; color:#00c6ff; opacity:.9; }

/* QUICK ACCESS */
.quick-title{ font-size:20px; margin-bottom:9px; }
.quick-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.quick-card{ height:112px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:15px; padding:13px; position:relative; transition:.3s; cursor:pointer; }
.quick-card:hover{ transform:translateY(-3px); box-shadow:0 0 22px rgba(0,198,255,.22); }
.quick-card i{ font-size:21px; color:#00c6ff; margin-bottom:8px; }
.quick-card h3{ font-size:14px; margin-bottom:4px; }
.quick-card p{ font-size:10.8px; line-height:1.35; color:rgba(255,255,255,.65); }
.quick-card .arrow{ position:absolute; right:11px; bottom:11px; width:24px; height:24px; border-radius:50%; border:1px solid rgba(0,198,255,.6); display:flex; align-items:center; justify-content:center; }
.quick-card .arrow i{ font-size:12px; margin:0; color:#fff; }

/* FEATURE PAGE */
.feature-page{ max-width:760px; }
.feature-hero{
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13);
  border-radius:18px; padding:24px 22px; margin-bottom:16px;
  display:flex; align-items:center; gap:20px;
}
.feature-hero-icon{
  width:64px; height:64px; border-radius:18px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:28px;
}
.feature-hero h2{ font-size:22px; font-weight:800; margin-bottom:4px; }
.feature-hero p{ font-size:13px; color:rgba(255,255,255,.65); }

.feature-section{
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.11);
  border-radius:15px; padding:18px; margin-bottom:12px;
}
.feature-section h4{
  font-size:13px; font-weight:700; color:rgba(255,255,255,.5);
  letter-spacing:.8px; text-transform:uppercase; margin-bottom:12px;
}

/* ACTION BUTTON */
.action-btn{
  display:inline-flex; align-items:center; gap:9px;
  padding:11px 22px; border-radius:12px; border:none;
  font-size:14px; font-weight:700; cursor:pointer;
  font-family:"Poppins",sans-serif; text-decoration:none;
  transition:.2s; margin-right:10px; margin-bottom:8px;
}
.action-btn.gold{ background:#ffb300; color:#000633; box-shadow:0 6px 18px rgba(255,179,0,.28); }
.action-btn.gold:hover{ opacity:.88; transform:translateY(-1px); }
.action-btn.blue{ background:rgba(0,109,255,.25); color:#5ab4ff; border:1px solid rgba(0,109,255,.4); }
.action-btn.blue:hover{ background:rgba(0,109,255,.35); }

/* STATUS PILL */
.status-pill{
  display:inline-block; padding:5px 14px; border-radius:20px;
  font-size:12px; font-weight:700;
}
.pill-green{ background:rgba(0,200,100,.15); color:#2cff88; border:1px solid rgba(0,200,100,.3); }
.pill-yellow{ background:rgba(255,179,0,.15); color:#ffb300; border:1px solid rgba(255,179,0,.3); }
.pill-red{ background:rgba(255,60,60,.15); color:#ff7070; border:1px solid rgba(255,60,60,.3); }
.pill-blue{ background:rgba(0,109,255,.15); color:#5ab4ff; border:1px solid rgba(0,109,255,.3); }

/* LOCKED STATE */
.locked-state{
  text-align:center; padding:40px 20px;
  color:rgba(255,255,255,.35);
}
.locked-state i{ font-size:44px; margin-bottom:14px; color:rgba(0,198,255,.3); display:block; }
.locked-state h3{ font-size:16px; font-weight:700; color:rgba(255,255,255,.5); margin-bottom:8px; }
.locked-state p{ font-size:13px; line-height:1.6; }

/* FILE CARD */
.file-card{
  display:flex; align-items:center; gap:14px;
  background:rgba(0,198,255,.07); border:1px solid rgba(0,198,255,.2);
  border-radius:12px; padding:14px 16px; margin-bottom:10px;
  text-decoration:none; color:#fff; transition:.2s;
}
.file-card:hover{ background:rgba(0,198,255,.14); transform:translateX(3px); }
.file-card i{ font-size:22px; color:#00c6ff; }
.file-card span{ font-size:13px; font-weight:600; }
.file-card .file-arrow{ margin-left:auto; color:#00c6ff; font-size:14px; }

/* INFO ROW */
.info-row{ display:flex; gap:8px; align-items:flex-start; margin-bottom:10px; font-size:13px; }
.info-row i{ color:#00c6ff; margin-top:2px; width:16px; flex-shrink:0; }
.info-row span{ color:rgba(255,255,255,.8); line-height:1.55; }

/* TICKET FORM */
.ticket-form input, .ticket-form textarea, .ticket-form select{
  width:100%; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.15);
  border-radius:10px; color:#fff; padding:10px 13px; font-size:13px;
  font-family:"Poppins",sans-serif; outline:none; margin-bottom:12px;
  transition:border-color .2s;
}
.ticket-form input:focus, .ticket-form textarea:focus, .ticket-form select:focus{ border-color:#00c6ff; }
.ticket-form textarea{ min-height:90px; resize:vertical; }
.ticket-form select option{ background:#000633; }
.ticket-form label{ display:block; font-size:12px; color:rgba(255,255,255,.65); margin-bottom:5px; }

/* SUPPORT LINKS */
.support-link-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.support-link-card{
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  border-radius:14px; text-decoration:none; color:#fff;
  background:rgba(0,198,255,.08); border:1px solid rgba(0,198,255,.22);
  transition:.25s ease;
}
.support-link-card:hover{ transform:translateY(-2px); background:rgba(0,198,255,.14); box-shadow:0 0 20px rgba(0,198,255,.16); }
.support-link-card i{ width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; background:rgba(0,198,255,.16); color:#00c6ff; }
.support-link-card h3{ font-size:14px; margin-bottom:2px; }
.support-link-card p{ font-size:11.5px; color:rgba(255,255,255,.6); }

/* ATTENDANCE CALENDAR */
.attendance-month-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; }
.attendance-month-bar h3{ font-size:18px; color:#fff; }
.attendance-nav-btn{ border:1px solid rgba(0,198,255,.35); background:rgba(0,198,255,.12); color:#fff; border-radius:10px; padding:8px 12px; cursor:pointer; font-weight:700; }
.attendance-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:9px; }
.day-name{ text-align:center; font-size:11px; color:rgba(255,255,255,.45); font-weight:700; padding:5px; }
.attendance-day{ min-height:76px; border-radius:13px; padding:9px; background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.10); display:flex; flex-direction:column; justify-content:space-between; }
.attendance-day.empty{ opacity:0; pointer-events:none; }
.attendance-day.today{ border-color:#ffb300; box-shadow:0 0 14px rgba(255,179,0,.18); }
.attendance-date{ font-size:13px; font-weight:800; }
.attendance-mark-btn{ border:none; border-radius:9px; padding:6px 7px; font-size:10.5px; font-weight:800; cursor:pointer; background:#ffb300; color:#000633; }
.attendance-marked{ border-radius:9px; padding:6px 7px; font-size:10.5px; font-weight:800; text-align:center; background:rgba(44,255,136,.15); color:#2cff88; border:1px solid rgba(44,255,136,.32); }
.attendance-disabled{ border-radius:9px; padding:6px 7px; font-size:10.5px; font-weight:700; text-align:center; background:rgba(255,255,255,.06); color:rgba(255,255,255,.35); }
@media(max-width:700px){ .attendance-grid{ gap:5px; } .attendance-day{ min-height:68px; padding:7px; } .support-link-grid{ grid-template-columns:1fr; } }

/* PAYMENT */
.payment-layout{ display:flex; gap:16px; }
.payment-sidebar{ width:200px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:15px; padding:12px; flex-shrink:0; }
.payment-menu{ padding:11px 12px; margin-bottom:8px; border-radius:10px; cursor:pointer; background:rgba(255,255,255,.05); font-size:13px; font-weight:600; transition:.2s; }
.payment-menu:hover{ background:rgba(0,198,255,.15); }
.payment-menu.active{ background:rgba(0,198,255,.18); box-shadow:inset 3px 0 #ffb300; }
.payment-content{ flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13); border-radius:15px; padding:20px; }

/* PROFILE */
.profile-tabs{ display:flex; gap:12px; margin-bottom:16px; }
.profile-tab-btn{ width:165px; height:40px; border:none; border-radius:11px; background:#ffb300; color:#000633; font-weight:800; cursor:pointer; font-family:"Poppins",sans-serif; font-size:13px; transition:.25s; }
.profile-tab-btn:hover{ opacity:.88; }
.profile-tab-btn.blue-btn{ background:#00c6ff; color:#000633; }
.profile-card{ max-width:520px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:17px; padding:18px; margin-bottom:14px; }
.profile-card h3{ margin-bottom:14px; font-size:18px; }
.form-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.input-box{ margin-bottom:12px; }
.input-box label{ display:block; font-size:12px; margin-bottom:5px; color:rgba(255,255,255,.78); }
.input-box input{ width:100%; height:36px; border-radius:9px; border:1px solid rgba(255,255,255,.18); background:rgba(0,10,35,.35); color:#fff; padding:0 12px; outline:none; font-size:13px; font-family:"Poppins",sans-serif; transition:border-color .25s; }
.input-box input:focus{ border-color:#00c6ff; }
.save-btn{ width:100%; height:38px; border:none; border-radius:11px; background:#ffb300; color:#000633; font-weight:800; font-size:13px; cursor:pointer; font-family:"Poppins",sans-serif; transition:.25s; }
.save-btn:hover{ opacity:.88; }
.save-btn:disabled{ opacity:.55; cursor:not-allowed; }
.profile-msg{ padding:8px 12px; border-radius:9px; font-size:12.5px; font-weight:600; margin-bottom:12px; display:none; }
.profile-msg.err{ background:rgba(255,60,60,.18); border:1px solid rgba(255,60,60,.4); color:#ff6b6b; }
.profile-msg.ok{ background:rgba(0,200,100,.15); border:1px solid rgba(0,200,100,.35); color:#2cff88; }

@media(max-width:1100px){
  body{ overflow:auto; }
  .dashboard{ transform:none; width:100%; height:auto; flex-direction:column; }
  .sidebar{ width:100%; height:auto; margin-top:0; }
  .main{ width:100%; height:auto; overflow:visible; }
  .stats,.feature-row,.quick-grid,.form-row{ grid-template-columns:1fr; }
  .payment-layout{ flex-direction:column; }
  .payment-sidebar{ width:100%; }
}
</style>
</head>
<body>

<div id="authGate"><p><i class="fa-solid fa-circle-notch fa-spin" style="margin-right:8px;color:#00c6ff;"></i>Loading...</p></div>
<div id="toast"></div>

<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">
      <h1><span class="nandan">Nandan</span> <span class="rcm">RCM</span></h1>
      <p>Solutions</p>
    </div>

    <div class="nav-item active"  onclick="openDashboard(this)">         <i class="fa-solid fa-house"></i> Dashboard</div>
    <div class="nav-item"         onclick="openFeaturePage('My Courses',this)">  <i class="fa-solid fa-book-open"></i> My Courses</div>
    <div class="nav-item"         onclick="openFeaturePage('Webinars',this)">     <i class="fa-solid fa-person-chalkboard"></i> Webinars</div>
    <div class="nav-item"         onclick="openFeaturePage('Recordings/Notes',this)"><i class="fa-solid fa-chalkboard-user"></i> Recordings/Notes</div>
    <div class="nav-item"         onclick="openFeaturePage('Internships',this)">  <i class="fa-solid fa-user-graduate"></i> Internships</div>
    <div class="nav-item"         onclick="openFeaturePage('Documents',this)">    <i class="fa-solid fa-folder-open"></i> Documents</div>
    <div class="nav-item"         onclick="openFeaturePage('Attendance',this)">   <i class="fa-solid fa-user-check"></i> Attendance</div>
    <div class="nav-item"         onclick="openPayments(this)">           <i class="fa-solid fa-wallet"></i> Payments</div>
    <div class="nav-item"         onclick="openProfile(this)">            <i class="fa-solid fa-user"></i> My Profile</div>

    <div class="student-profile">
      <div class="avatar" id="sidebarAvatar">S</div>
      <div><h4 id="sidebarName">Student</h4><p>Online</p></div>
    </div>
  </aside>

  <main class="main" id="mainContent"></main>
</div>

<script>
// ── FIREBASE ──────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:    "AIzaSyBdMTgzZGI10Bu3z4dm-ZUSumxN50H7UjE",
  authDomain:"nandan-rcm.firebaseapp.com",
  projectId: "nandan-rcm",
  appId:     "1:418121831280:web:8f2eb7228971d0fbe7b5b5"
});
const auth = firebase.auth();
const db   = firebase.firestore();
let SD = {}; // student data cache

// ── AUTH GATE ─────────────────────────────────────────────────────
auth.onAuthStateChanged(async function(user){
  if(!user){ window.location.href="login.html"; return; }

  const gate = document.getElementById("authGate");
  gate.classList.add("hide");
  setTimeout(()=> gate.style.display="none", 400);

  const name = user.displayName || user.email || "Student";
  document.getElementById("sidebarName").textContent    = name.split(" ")[0];
  document.getElementById("sidebarAvatar").textContent  = name.charAt(0).toUpperCase();

  await loadStudentData();
  openDashboard();
});

// ── LOAD STUDENT DATA ─────────────────────────────────────────────
async function loadStudentData(){
  const user = auth.currentUser;
  if(!user) return;
  try{
    const snap = await db.collection("students").doc(user.uid).get();
    if(snap.exists){
      SD = snap.data();
      if(SD.firstName){
        document.getElementById("sidebarName").textContent   = SD.firstName;
        document.getElementById("sidebarAvatar").textContent = SD.firstName.charAt(0).toUpperCase();
      }
    }
  }catch(e){ console.warn("loadStudentData:", e.message); }
}

// ── HELPERS ───────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 3200);
}

function setActive(el){
  document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
  if(el) el.classList.add("active");
}

function topbar(title, sub){
  return `
    <div class="topbar">
      <div><h1>${title}</h1><p>${sub}</p></div>
      <button class="logout-btn" onclick="logout()">Logout <i class="fa-solid fa-right-from-bracket"></i></button>
    </div>`;
}

function quickCard(icon, title, text, fn){
  return `
    <div class="quick-card" onclick="${fn}">
      <i class="fa-solid ${icon}"></i>
      <h3>${title}</h3>
      <p>${text}</p>
      <div class="arrow"><i class="fa-solid fa-angle-right"></i></div>
    </div>`;
}

function lockedHTML(label){
  return `
    <div class="locked-state">
      <i class="fa-solid fa-lock"></i>
      <h3>${label} Not Assigned Yet</h3>
      <p>This section hasn't been enabled for your account yet.<br>
         Please contact your trainer or admin for access.</p>
    </div>`;
}

function fileCard(url, label){
  if(!url) return "";
  return `
    <a href="${url}" target="_blank" class="file-card">
      <i class="fa-solid fa-file-arrow-down"></i>
      <span>${label || "Download File"}</span>
      <i class="fa-solid fa-arrow-up-right-from-square file-arrow"></i>
    </a>`;
}

function escapeHTML(value){
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function openDashboard(el){
  if(el) setActive(el);
  else document.querySelector(".nav-item").classList.add("active");

  document.getElementById("mainContent").innerHTML = `
    ${topbar("My Dashboard","Welcome back to your Nandan RCM learning portal. 👋")}

    <div class="stats">

async function submitTicket(){
  const user    = auth.currentUser;
  const subject = document.getElementById("tk_subject").value.trim();
  const details = document.getElementById("tk_details").value.trim();
  const priority= document.getElementById("tk_priority").value;
  const msgEl   = document.getElementById("tkMsg");

  if(!subject || !details){
    msgEl.textContent="Please fill in subject and details.";
    msgEl.className="profile-msg err"; msgEl.style.display="block"; return;
  }

  try{
    await db.collection("tickets").add({
      email:     user.email,
      uid:       user.uid,
      studentName: SD.firstName ? SD.firstName+" "+(SD.lastName||"") : user.email,
      subject,
      message:   details,
      priority,
      status:    "Open",
      createdAt: new Date().toISOString()
    });
    msgEl.textContent="Ticket submitted successfully ✅";
    msgEl.className="profile-msg ok"; msgEl.style.display="block";
    document.getElementById("tk_subject").value="";
    document.getElementById("tk_details").value="";
    showToast("Ticket raised ✅");
    loadMyTickets();
  }catch(err){
    msgEl.textContent="Error: "+err.message;
    msgEl.className="profile-msg err"; msgEl.style.display="block";
  }
}

async function loadMyTickets(){
  const user = auth.currentUser;
  const area = document.getElementById("myTicketsList");
  if(!area) return;
  try{
    const snap = await db.collection("tickets")
      .where("uid","==",user.uid)
      .get();

    if(snap.empty){
      area.innerHTML="<p style='color:rgba(255,255,255,.4);font-size:13px;'>No tickets raised yet.</p>";
      return;
    }

    const docs = [];
    snap.forEach(d => docs.push({id:d.id,...d.data()}));
    docs.sort((a,b)=> (b.createdAt||"").localeCompare(a.createdAt||""));

    let html = "";
    docs.forEach(t=>{
      const pillC = t.status==="Resolved"?"pill-green": t.status==="In Progress"?"pill-yellow":"pill-blue";
      const safeId = t.id;
      html += `
        <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px;">
            <span style="font-size:13.5px;font-weight:700;">${escapeHTML(t.subject)||"—"}</span>
            <span class="status-pill ${pillC}">${escapeHTML(t.status)||"Open"}</span>
          </div>

          <p style="font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;">${escapeHTML(t.message)||""}</p>
          <p style="font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;">Priority: ${escapeHTML(t.priority)||"Normal"} · ${(t.createdAt||"").split("T")[0]}</p>

          <div id="replies_${safeId}" style="margin-top:12px;">
            <p style="color:rgba(255,255,255,.35);font-size:12px;">Loading replies...</p>
          </div>

          <div class="ticket-form" style="margin-top:12px;">
            <label>Reply to this ticket</label>
            <textarea id="reply_${safeId}" placeholder="Type your reply..." style="min-height:58px;margin-bottom:8px;"></textarea>
            <div class="profile-msg" id="replyMsg_${safeId}"></div>
            <button class="action-btn gold" onclick="sendTicketReply('${safeId}')">
              <i class="fa-solid fa-reply"></i> Send Reply
            </button>
          </div>
        </div>`;
    });
    area.innerHTML = html;
    docs.forEach(t => loadTicketReplies(t.id));
  }catch(e){
    area.innerHTML=`<p style='color:#ff7070;font-size:13px;'>Error loading tickets: ${e.message}</p>`;
  }
}

async function loadTicketReplies(ticketId){
  const area = document.getElementById("replies_"+ticketId);
  if(!area) return;
  try{
    const snap = await db.collection("tickets")
      .doc(ticketId)
      .collection("replies")
      .get();

    if(snap.empty){
      area.innerHTML = "<p style='color:rgba(255,255,255,.35);font-size:12px;'>No replies yet.</p>";
      return;
    }

    const replies = [];
    snap.forEach(d => replies.push({id:d.id,...d.data()}));
    replies.sort((a,b)=> (a.createdAt||"").localeCompare(b.createdAt||""));

    let html = `<div style="border-top:1px solid rgba(255,255,255,.1);padding-top:10px;">
      <p style="font-size:12px;font-weight:700;color:#00c6ff;margin-bottom:8px;">Replies</p>`;

    replies.forEach(r=>{
      const isStudent = r.senderRole === "student";
      html += `
        <div style="background:${isStudent?"rgba(0,198,255,.08)":"rgba(255,179,0,.10)"};border:1px solid ${isStudent?"rgba(0,198,255,.18)":"rgba(255,179,0,.22)"};border-radius:10px;padding:10px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;">
            <b style="font-size:12px;color:${isStudent?"#00c6ff":"#ffb300"};">${isStudent?"You":"Admin"}</b>
            <span style="font-size:10.5px;color:rgba(255,255,255,.35);">${(r.createdAt||"").replace("T"," ").slice(0,16)}</span>
          </div>
          <p style="font-size:12px;color:rgba(255,255,255,.72);line-height:1.55;">${escapeHTML(r.message)}</p>
        </div>`;
    });

    html += `</div>`;
    area.innerHTML = html;
  }catch(e){
    area.innerHTML = `<p style='color:#ff7070;font-size:12px;'>Error loading replies: ${e.message}</p>`;
  }
}

async function sendTicketReply(ticketId){
  const user = auth.currentUser;
  const txt  = document.getElementById("reply_"+ticketId);
  const msg  = document.getElementById("replyMsg_"+ticketId);
  if(!user || !txt || !msg) return;

  const reply = txt.value.trim();
  if(!reply){
    msg.textContent = "Please type your reply.";
    msg.className = "profile-msg err";
    msg.style.display = "block";
    return;
  }

  try{
    await db.collection("tickets")
      .doc(ticketId)
      .collection("replies")
      .add({
        uid: user.uid,
        email: user.email || "",
        senderRole: "student",
        message: reply,
        createdAt: new Date().toISOString()
      });

    await db.collection("tickets").doc(ticketId).set({
      status: "Open",
      lastReplyBy: "student",
      updatedAt: new Date().toISOString()
    }, {merge:true});

    txt.value = "";
    msg.textContent = "Reply sent successfully ✅";
    msg.className = "profile-msg ok";
    msg.style.display = "block";
    showToast("Reply sent ✅");
    loadTicketReplies(ticketId);
    setTimeout(()=>{ msg.style.display="none"; }, 3000);
  }catch(e){
    msg.textContent = "Error: " + e.message;
    msg.className = "profile-msg err";
    msg.style.display = "block";
  }
}

// ── ATTENDANCE ───────────────────────────────────────────────────
let attendanceMonth = new Date().getMonth();
let attendanceYear  = new Date().getFullYear();
let attendanceMap   = {};

function pageAttendance(){
  document.getElementById("mainContent").innerHTML = `
    ${topbar("Attendance","Mark and view your attendance date-wise.")}
    <div class="feature-page" style="max-width:960px;">
      <div class="feature-hero">
        <div class="feature-hero-icon green"><i class="fa-solid fa-user-check"></i></div>
        <div>
          <h2>My Attendance</h2>
          <p>Select the date and mark your own attendance. Marked dates will be saved to Firebase.</p>
        </div>
      </div>

      <div class="feature-section">
        <h4>Attendance Calendar</h4>
        <div class="attendance-month-bar">
          <button class="attendance-nav-btn" onclick="changeAttendanceMonth(-1)"><i class="fa-solid fa-angle-left"></i> Previous</button>
          <h3 id="attendanceMonthTitle"></h3>
          <button class="attendance-nav-btn" onclick="changeAttendanceMonth(1)">Next <i class="fa-solid fa-angle-right"></i></button>
        </div>
        <div id="attendanceStatus" style="font-size:12.5px;color:rgba(255,255,255,.55);margin-bottom:10px;"></div>
        <div id="attendanceCalendar"></div>
      </div>
    </div>`;

  loadAttendanceDates();
}

function attendanceDateKey(y,m,d){
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function renderAttendanceCalendar(){
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const title=document.getElementById("attendanceMonthTitle");
  const cal=document.getElementById("attendanceCalendar");
  if(!title || !cal) return;

  title.textContent = `${monthNames[attendanceMonth]} ${attendanceYear}`;
  const firstDay = new Date(attendanceYear, attendanceMonth, 1).getDay();
  const daysInMonth = new Date(attendanceYear, attendanceMonth+1, 0).getDate();
  const today = new Date();
  const todayKey = attendanceDateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let html = `<div class="attendance-grid">`;
  dayNames.forEach(d=> html += `<div class="day-name">${d}</div>`);
  for(let i=0;i<firstDay;i++) html += `<div class="attendance-day empty"></div>`;

  for(let d=1; d<=daysInMonth; d++){
    const key = attendanceDateKey(attendanceYear, attendanceMonth, d);
    const isToday = key === todayKey;
    const isFuture = new Date(attendanceYear, attendanceMonth, d) > new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const marked = attendanceMap[key];
    const markedStatus = typeof marked === "string" ? marked : (marked ? "Present" : "");
    html += `
      <div class="attendance-day ${isToday ? "today" : ""}">
        <div class="attendance-date">${d}</div>
        ${markedStatus
          ? `<div class="attendance-marked" style="${markedStatus==="Absent"?"background:rgba(255,60,60,.15);color:#ff7070;border-color:rgba(255,60,60,.32);":""}"><i class="fa-solid ${markedStatus==="Absent"?"fa-xmark":"fa-check"}"></i> ${markedStatus}</div>`
          : isFuture
            ? `<div class="attendance-disabled">Upcoming</div>`
            : `<button class="attendance-mark-btn" onclick="markAttendance('${key}')">Mark Present</button>`
        }
      </div>`;
  }
  html += `</div>`;
  cal.innerHTML = html;
}

function changeAttendanceMonth(step){
  attendanceMonth += step;
  if(attendanceMonth < 0){ attendanceMonth = 11; attendanceYear--; }
  if(attendanceMonth > 11){ attendanceMonth = 0; attendanceYear++; }
  loadAttendanceDates();
}

async function loadAttendanceDates(){
  const user = auth.currentUser;
  const status = document.getElementById("attendanceStatus");
  attendanceMap = {};
  renderAttendanceCalendar();
  if(!user) return;
  if(status) status.textContent = "Loading attendance...";

  const monthStart = attendanceDateKey(attendanceYear, attendanceMonth, 1);
  const monthEnd   = attendanceDateKey(attendanceYear, attendanceMonth, new Date(attendanceYear, attendanceMonth+1, 0).getDate());
  try{
    // Simple query only by uid, then date-filter in JavaScript.
    // This avoids Firestore composite index errors.
    const snap = await db.collection("attendance")
      .where("uid","==",user.uid)
      .get();

    snap.forEach(doc=>{
      const d = doc.data();
      if(d.date && d.date >= monthStart && d.date <= monthEnd){
        attendanceMap[d.date] = d.status || "Present";
      }
    });

    if(status) status.textContent = "Click Mark Present on the correct class date.";
    renderAttendanceCalendar();
  }catch(e){
    if(status) status.innerHTML = `<span style="color:#ff7070;">Error loading attendance: ${e.message}</span>`;
  }
}

async function markAttendance(dateKey){
  const user = auth.currentUser;
  if(!user){ showToast("Please login again."); return; }
  try{
    await db.collection("attendance").doc(`${user.uid}_${dateKey}`).set({
      uid:user.uid,
      email:user.email || "",
      studentName: SD.firstName ? `${SD.firstName} ${SD.lastName||""}`.trim() : (user.displayName || user.email || "Student"),
      date:dateKey,
      status:"Present",
      markedAt:new Date().toISOString()
    },{merge:true});
    attendanceMap[dateKey]=true;
    renderAttendanceCalendar();
    showToast("Attendance marked ✅");
  }catch(e){
    showToast("Attendance error: "+e.message);
  }
}

}

function showProfileMsg(msg, type){
  const el = document.getElementById("profileMsg");
  if(!el) return;
  el.textContent = msg; el.className="profile-msg "+type; el.style.display="block";
  if(type==="ok") setTimeout(()=>{ el.style.display="none"; }, 3500);
}

async function saveProfile(){
  const user = auth.currentUser;
  if(!user){ showProfileMsg("Session expired.","err"); return; }
  const firstName = document.getElementById("firstName").value.trim();
  const lastName  = document.getElementById("lastName").value.trim();
  const email     = document.getElementById("email").value.trim();
  const phone     = document.getElementById("phone").value.trim();
  if(!firstName){ showProfileMsg("First name is required.","err"); return; }
  const btn = document.getElementById("saveBtn");
  const orig = btn.innerHTML;
  btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
  try{
    await db.collection("students").doc(user.uid).set(
      {firstName,lastName,email,phone,updatedAt:new Date().toISOString()},{merge:true});
    SD.firstName=firstName; SD.lastName=lastName;
    document.getElementById("sidebarName").textContent   = firstName;
    document.getElementById("sidebarAvatar").textContent = firstName.charAt(0).toUpperCase();
    btn.innerHTML='<i class="fa-solid fa-check"></i> Saved!';
    showProfileMsg("Profile updated successfully ✅","ok");
    showToast("Profile updated ✅");
    setTimeout(()=>{ btn.disabled=false; btn.innerHTML=orig; },2000);
  }catch(err){
    showProfileMsg("Error: "+err.message,"err");
    btn.disabled=false; btn.innerHTML=orig;
  }
}

function showPwMsg(msg,type){
  const el=document.getElementById("pwMsg");
  if(!el) return;
  el.textContent=msg; el.className="profile-msg "+type; el.style.display="block";
}

async function changePassword(){
  const user=auth.currentUser;
  if(!user){ showPwMsg("Session expired.","err"); return; }
  const newPw  = document.getElementById("newPassword").value;
  const confPw = document.getElementById("confirmPassword").value;
  if(!newPw)          { showPwMsg("Please enter a new password.","err"); return; }
  if(newPw!==confPw)  { showPwMsg("Passwords do not match.","err"); return; }
  if(newPw.length<6)  { showPwMsg("Minimum 6 characters required.","err"); return; }
  const btn=document.getElementById("pwBtn"); const orig=btn.innerHTML;
  btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> Updating...';
  try{
    await user.updatePassword(newPw);
    document.getElementById("newPassword").value="";
    document.getElementById("confirmPassword").value="";
    btn.innerHTML='<i class="fa-solid fa-check"></i> Done!';
    showPwMsg("Password changed successfully ✅","ok");
    showToast("Password changed ✅");
    setTimeout(()=>{ btn.disabled=false; btn.innerHTML=orig; },2000);
  }catch(err){ showPwMsg("Error: "+err.message,"err"); btn.disabled=false; btn.innerHTML=orig; }
}
