<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}body{width:100%;height:100vh;overflow:hidden;color:#fff;background:radial-gradient(circle at top right,rgba(0,198,255,.18),transparent 35%),radial-gradient(circle at bottom left,rgba(255,179,0,.12),transparent 32%),#000633}.admin-wrap{width:100vw;height:100vh;display:flex;gap:14px;padding:18px}.sidebar{width:255px;background:rgba(1,14,41,.78);border:1px solid rgba(0,198,255,.28);border-radius:20px;padding:18px 14px;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,198,255,.12)}.logo{text-align:center;padding-bottom:15px;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,.12)}.logo h1{font-size:24px;font-weight:800;line-height:1.1}.logo h1 span{color:#ffb300}.logo p{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.7);margin-top:3px}.nav-item{height:40px;display:flex;align-items:center;gap:11px;padding:0 13px;border-radius:11px;margin-bottom:7px;color:#fff;font-size:12.5px;cursor:pointer;transition:.25s}.nav-item i{color:#00c6ff;width:18px}.nav-item.active,.nav-item:hover{background:rgba(0,198,255,.16);box-shadow:inset 4px 0 #ffb300}.admin-info{margin-top:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:15px;padding:12px;font-size:12px;color:rgba(255,255,255,.75)}.main{flex:1;height:100%;overflow:auto;padding-right:4px}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:40px;   /* gap between title and 4 boxes */
  padding-top:25px;     /* moves Admin Overview down */
}

.topbar h1{font-size:25px;font-weight:800}.topbar p{font-size:13px;color:rgba(255,255,255,.72);margin-top:4px}.btn-row{display:flex;gap:10px;flex-wrap:wrap}button{font-family:"Poppins",sans-serif}.primary-btn,.secondary-btn,.danger-btn{height:40px;border:none;border-radius:10px;font-weight:800;cursor:pointer;padding:0 16px}.primary-btn{background:#ffb300;color:#000633}.secondary-btn{border:1px solid rgba(0,198,255,.45);background:rgba(0,198,255,.12);color:#fff}.danger-btn{background:rgba(255,60,60,.18);border:1px solid rgba(255,60,60,.35);color:#ffb3b3}.logout-btn{border:none;background:linear-gradient(90deg,#ffb300,#ffd76a);color:#000633;padding:10px 22px;border-radius:12px;font-weight:800;cursor:pointer}

.card{
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:0 14px 34px rgba(0,0,0,.18);
}

.section-title{font-size:17px;margin-bottom:12px;color:#fff}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.grid-4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:28px;
  margin-bottom:40px;   /* gap between 4 boxes and Quick Actions */
}

.search-row{display:grid;grid-template-columns:1fr 145px;gap:12px}.input-box{margin-bottom:12px}.input-box label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.78);margin-bottom:6px}.input-box input,.input-box textarea,.input-box select{width:100%;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(0,10,35,.36);color:#fff;padding:0 12px;outline:none;font-size:13px}.input-box textarea{height:88px;padding:12px;resize:none}.input-box option{background:#000633;color:#fff}.stat-card{height:92px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:15px;padding:14px;display:flex;align-items:center;gap:12px}.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;background:linear-gradient(135deg,#006dff,#00c6ff)}.stat-card h2{font-size:26px;line-height:1;color:#ffb300}.stat-card p{font-size:11.5px;color:rgba(255,255,255,.70);margin-top:4px}.table{width:100%;border-collapse:collapse;margin-top:8px}.table th{text-align:left;color:#00c6ff;font-size:12px;padding:11px;border-bottom:1px solid rgba(255,255,255,.14)}.table td{padding:11px;border-bottom:1px solid rgba(255,255,255,.09);font-size:12px;color:rgba(255,255,255,.84);vertical-align:top}.msg{display:none;padding:10px 13px;border-radius:10px;font-size:12.5px;font-weight:600;margin-bottom:12px}.msg.ok{display:block;background:rgba(0,200,100,.15);border:1px solid rgba(0,200,100,.35);color:#2cff88}.msg.err{display:block;background:rgba(255,60,60,.16);border:1px solid rgba(255,60,60,.35);color:#ff7070}.student-box{display:flex;align-items:center;justify-content:space-between;gap:15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:13px;margin-top:12px}.student-box h3{font-size:15px}.student-box p{font-size:12px;color:rgba(255,255,255,.65)}.feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.feature-box{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.12);border-radius:15px;padding:14px}.feature-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.feature-head h3{font-size:14px;color:#fff}.feature-head label{font-size:12px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:7px}.feature-head input{accent-color:#ffb300}.file-row{display:grid;grid-template-columns:1fr 110px;gap:8px}.small-note{font-size:11px;color:rgba(255,255,255,.5);margin-top:8px;line-height:1.5}.profile-card{max-width:620px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:17px;padding:18px;margin-bottom:14px}.admin-list-card{display:flex;justify-content:space-between;align-items:center;gap:12px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;margin-top:10px}.admin-list-card p{font-size:12px;color:rgba(255,255,255,.65)}.mini-btn{height:30px;border:none;border-radius:8px;font-weight:800;cursor:pointer;padding:0 10px;font-size:11px;margin:2px}.mini-btn.gold{background:#ffb300;color:#000633}.mini-btn.blue{background:rgba(0,198,255,.16);border:1px solid rgba(0,198,255,.35);color:#fff}.mini-btn.red{background:rgba(255,60,60,.18);border:1px solid rgba(255,60,60,.35);color:#ffb3b3}.attendance-tools{display:grid;grid-template-columns:1fr 160px 130px;gap:12px}.att-present{color:#2cff88;font-weight:800}.att-absent{color:#ff7070;font-weight:800}.att-unmarked{color:rgba(255,255,255,.45)}
.student-manager-table-wrap{width:100%;overflow:auto;margin-top:14px;border-radius:14px;border:1px solid rgba(255,255,255,.10)}
.student-manager-table{min-width:1280px;width:100%;border-collapse:collapse;background:rgba(255,255,255,.035)}
.student-manager-table th{text-align:left;color:#00c6ff;font-size:12px;padding:11px;border-bottom:1px solid rgba(255,255,255,.14);white-space:nowrap}
.student-manager-table td{padding:10px 11px;border-bottom:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.84);vertical-align:middle;white-space:nowrap}
.status-pill{display:inline-flex;align-items:center;justify-content:center;min-width:74px;height:26px;padding:0 10px;border-radius:999px;font-size:11px;font-weight:800}
.status-pill.active{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35);color:#2cff88}
.status-pill.inactive{background:rgba(255,60,60,.18);border:1px solid rgba(255,60,60,.35);color:#ff9b9b}
.action-wrap{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;min-width:230px}
.icon-action{width:32px;height:32px;border-radius:8px;border:1px solid rgba(0,198,255,.25);background:rgba(255,255,255,.92);color:#39566b;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:.22s;margin:2px}
.icon-action:hover{transform:translateY(-2px);border-color:#00c6ff;box-shadow:0 8px 18px rgba(0,198,255,.18);color:#00112F}
.icon-action.red:hover{border-color:#ff7070;box-shadow:0 8px 18px rgba(255,60,60,.18);color:#dc2626}
.student-check{width:16px;height:16px;accent-color:#ffb300;cursor:pointer}
.bulk-student-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.10);border-radius:12px;background:rgba(255,255,255,.045)}
.manager-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.manager-summary .stat-card{height:78px}
@media(max-width:1100px){.manager-summary{grid-template-columns:1fr 1fr}.student-manager-table{min-width:1000px}}
@media(max-width:1100px){body{overflow:auto}.admin-wrap{height:auto;flex-direction:column}.sidebar{width:100%}.grid-2,.grid-3,.grid-4,.search-row,.feature-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="admin-wrap"><aside class="sidebar"><div class="logo"><h1>Nandan <span>RCM</span></h1><p>ADMIN DASHBOARD</p></div><div class="nav-item active" onclick="openOverview(this)"><i class="fa-solid fa-gauge"></i> Overview</div><div class="nav-item" onclick="openStudentManager(this)"><i class="fa-solid fa-user-gear"></i> Student Manager</div><div class="nav-item" onclick="openAttendanceTracking(this)"><i class="fa-solid fa-user-check"></i> Attendance Tracking</div><div class="nav-item" onclick="openBulkUpdate(this)"><i class="fa-solid fa-users-gear"></i> Bulk Update</div><div class="nav-item" onclick="openReports(this)"><i class="fa-solid fa-file-excel"></i> Reports / Excel</div><div class="nav-item" onclick="openPayments(this)"><i class="fa-solid fa-wallet"></i> Payments</div><div class="nav-item" onclick="openTickets(this)"><i class="fa-solid fa-ticket"></i> Support Tickets</div><div class="nav-item" onclick="openAnnouncements(this)"><i class="fa-solid fa-bullhorn"></i> Announcements</div><div class="nav-item" onclick="openAdminManagement(this)"><i class="fa-solid fa-user-shield"></i> Admin Management</div><div class="nav-item" onclick="openMyProfile(this)"><i class="fa-solid fa-user"></i> My Profile</div><div class="admin-info"><b>Admin Access</b><br>Assign, upload, bulk update, export reports, manage tickets and payments.</div></aside><main class="main" id="mainContent"></main></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyBdMTgzZGI10Bu3z4dm-ZUSumxN50H7UjE",authDomain:"nandan-rcm.firebaseapp.com",projectId:"nandan-rcm",appId:"1:418121831280:web:8f2eb7228971d0fbe7b5b5",storageBucket:"nandan-rcm.appspot.com"});
const auth=firebase.auth(),db=firebase.firestore(),storage=firebase.storage();
const superAdmins=["vrprasad7@gmail.com","raji202677@gmail.com","nandanrcmsolutions@gmail.com"];
let selectedStudentId=null,selectedStudentData=null,allStudentsCache=[];
// Auth gate: hide page until Firebase confirms admin login
document.body.insertAdjacentHTML("afterbegin","<div id=\"authGate\" style=\"position:fixed;inset:0;background:#000633;display:flex;align-items:center;justify-content:center;z-index:99999;\"><p style=\"color:rgba(255,255,255,.6);font-size:14px;\"><i class=\"fa-solid fa-circle-notch fa-spin\" style=\"margin-right:8px;color:#00c6ff;\"></i>Verifying admin access...</p></div>");
auth.onAuthStateChanged(async user=>{
  if(!user){window.location.href="login.html";return;}
  const allowed=await isAllowedAdmin(user);
  if(!allowed){alert("Admin access denied.");window.location.href="student-dashboard.html";return;}
  // Auth confirmed — hide gate and load dashboard
  const gate=document.getElementById("authGate");
  if(gate){gate.style.opacity="0";gate.style.transition="opacity 0.4s";setTimeout(()=>gate.remove(),400);}
  openOverview();
});
async function isAllowedAdmin(user){if(!user||!user.email)return false;if(superAdmins.includes(user.email.toLowerCase()))return true;const snap=await db.collection("admins").doc(user.uid).get();return snap.exists;}
function setActive(el){document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));if(el)el.classList.add("active");}
function showMsg(id,text,type){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.className="msg "+type;}
function topbar(title,sub){return `<div class="topbar"><div><h1>${title}</h1><p>${sub}</p></div><button class="logout-btn" onclick="logout()">Logout</button></div>`;}
function safe(v){return (v??"").toString().replaceAll('"',"&quot;");}
function escapeHTML(value){return String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
async function openOverview(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Admin Overview","Nandan RCM student portal summary.")}<div class="grid-4"><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-users"></i></div><div><h2 id="totalStudents">0</h2><p>Total Students</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-book-open"></i></div><div><h2 id="totalCourses">0</h2><p>Enrolled Courses</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-wallet"></i></div><div><h2 id="paidStudents">0</h2><p>Paid Students</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-ticket"></i></div><div><h2 id="openTickets">0</h2><p>Open Tickets</p></div></div></div><div class="card"><h2 class="section-title">Quick Actions</h2><div class="btn-row"><button class="primary-btn" onclick="openStudentManager(document.querySelectorAll('.nav-item')[1])">Find Student</button><button class="secondary-btn" onclick="openBulkUpdate(document.querySelectorAll('.nav-item')[3])">Bulk Update</button><button class="secondary-btn" onclick="openReports(document.querySelectorAll('.nav-item')[4])">Export Reports</button></div></div>`;try{const students=await db.collection("students").get();document.getElementById("totalStudents").textContent=students.size;let courses=0,paid=0;students.forEach(doc=>{const d=doc.data();courses+=Number(d.enrolledCourses||0);if(d.paymentStatus==="Paid"||d.courseAccess===true)paid++;});document.getElementById("totalCourses").textContent=courses;document.getElementById("paidStudents").textContent=paid;const tickets=await db.collection("tickets").where("status","in",["Open","In Progress"]).get().catch(()=>({size:0}));document.getElementById("openTickets").textContent=tickets.size||0;}catch(e){console.log(e.message);}}
function openStudentManager(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Student Manager","Search student by email/mobile, view all students, and manage student accounts.")}<div class="card"><h2 class="section-title">Find Student</h2><div id="searchMsg" class="msg"></div><div class="search-row"><div class="input-box"><label>Email or Mobile Number</label><input type="text" id="studentSearch" placeholder="student@email.com or +919490369957"></div><button class="primary-btn" onclick="findStudent()">Search</button></div><div id="studentResult"></div></div><div class="card"><div class="btn-row" style="justify-content:space-between;align-items:center;"><h2 class="section-title" style="margin-bottom:0;">All Student Details</h2><button class="secondary-btn" onclick="loadStudentManagerList()">Refresh List</button></div><div id="studentManagerList" style="margin-top:14px;color:rgba(255,255,255,.6);font-size:13px;">Loading students...</div></div><div id="assignArea"></div>`;loadStudentManagerList();}

function formatDateValue(value){
  if(!value)return "-";
  try{
    if(value.toDate)value=value.toDate();
    const d=value instanceof Date?value:new Date(value);
    if(isNaN(d.getTime()))return escapeHTML(value);
    return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
  }catch(e){return escapeHTML(value);}
}
function getStudentStatus(d){return (d.accountStatus||d.status||"Active").toString();}
function getStudentName(d){return d.fullName||[d.firstName,d.lastName].filter(Boolean).join(" ")||"Student";}
let selectedStudentRows=[];
function toggleAllStudents(source){
  document.querySelectorAll(".student-check").forEach(cb=>cb.checked=source.checked);
  updateSelectedStudentRows();
}
function updateSelectedStudentRows(){
  selectedStudentRows=Array.from(document.querySelectorAll(".student-check:checked")).map(cb=>cb.value);
  const count=document.getElementById("selectedStudentCount");
  if(count)count.textContent=selectedStudentRows.length;
}
async function bulkResetSelectedStudentPasswords(){
  if(!selectedStudentRows.length){alert("Please select at least one student.");return;}
  if(!confirm("Reset selected student passwords to NandanRCM?"))return;
  for(const id of selectedStudentRows){await resetStudentPassword(id,false);}
  alert("Selected student password reset request completed. Default password: NandanRCM");
}
async function bulkSetSelectedStatus(status){
  if(!selectedStudentRows.length){alert("Please select at least one student.");return;}
  if(!confirm("Mark selected students as "+status+"?"))return;
  const batch=db.batch();
  selectedStudentRows.forEach(id=>batch.set(db.collection("students").doc(id),{accountStatus:status,courseAccess:status==="Active",updatedByAdminAt:new Date().toISOString(),updatedByAdminEmail:auth.currentUser.email||""},{merge:true}));
  await batch.commit();
  await loadStudentManagerList();
  alert("Selected students updated ✅");
}
async function bulkDeleteSelectedStudents(){
  if(!selectedStudentRows.length){alert("Please select at least one student.");return;}
  if(!confirm("Delete selected Firestore student records? Authentication users need Admin SDK/Cloud Function for deletion."))return;
  const batch=db.batch();
  selectedStudentRows.forEach(id=>batch.delete(db.collection("students").doc(id)));
  await batch.commit();
  await loadStudentManagerList();
  alert("Selected student records deleted ✅");
}
async function loadStudentManagerList(){
  const area=document.getElementById("studentManagerList");
  if(!area)return;
  area.innerHTML="Loading students...";
  try{
    const snap=await db.collection("students").orderBy("createdAt","desc").get().catch(()=>db.collection("students").get());
    allStudentsCache=[];
    let active=0,inactive=0,paid=0,pending=0;
    if(snap.empty){area.innerHTML=`<p class="small-note">No student records found.</p>`;return;}
    snap.forEach(doc=>{const d=doc.data();const item={id:doc.id,...d};allStudentsCache.push(item);const st=getStudentStatus(d).toLowerCase();if(st==="inactive")inactive++;else active++;if((d.paymentStatus||"Pending")==="Paid")paid++;else pending++;});
    let html=`<div class="manager-summary"><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-users"></i></div><div><h2>${allStudentsCache.length}</h2><p>Total Students</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-user-check"></i></div><div><h2>${active}</h2><p>Active</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-user-xmark"></i></div><div><h2>${inactive}</h2><p>Inactive</p></div></div><div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-wallet"></i></div><div><h2>${paid}</h2><p>Paid</p></div></div></div>`;
    html+=`<div class="bulk-student-actions"><b style="font-size:12px;color:#00c6ff;">Selected: <span id="selectedStudentCount">0</span></b><button class="mini-btn blue" onclick="bulkResetSelectedStudentPasswords()"><i class="fa-solid fa-key"></i> Reset to NandanRCM</button><button class="mini-btn gold" onclick="bulkSetSelectedStatus('Active')"><i class="fa-solid fa-user-check"></i> Active</button><button class="mini-btn red" onclick="bulkSetSelectedStatus('Inactive')"><i class="fa-solid fa-user-xmark"></i> Inactive</button><button class="mini-btn red" onclick="bulkDeleteSelectedStudents()"><i class="fa-solid fa-trash"></i> Delete</button></div><div class="student-manager-table-wrap"><table class="student-manager-table"><thead><tr><th><input type="checkbox" class="student-check" onclick="toggleAllStudents(this)"></th><th>Full Name</th><th>Email</th><th>Mobile</th><th>Date of Joining</th><th>Courses</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    allStudentsCache.forEach(s=>{
      const st=getStudentStatus(s);
      const stClass=st.toLowerCase()==="inactive"?"inactive":"active";
      const courses=s.courseName||s.myCoursesText||s.courseText||s.enrolledCourses||0;
      html+=`<tr><td><input type="checkbox" class="student-check" value="${s.id}" onchange="updateSelectedStudentRows()"></td><td>${escapeHTML(getStudentName(s))}</td><td>${escapeHTML(s.email||"-")}</td><td>${escapeHTML(s.phone||s.mobile||"-")}</td><td>${formatDateValue(s.createdAt||s.dateOfJoining||s.joiningDate)}</td><td>${escapeHTML(courses)}</td><td>${escapeHTML(s.paymentStatus||"Pending")}</td><td><span class="status-pill ${stClass}">${stClass==="inactive"?"Inactive":"Active"}</span></td><td><div class="action-wrap"><button class="icon-action" title="View Details" onclick="viewStudentDetails('${s.id}')"><i class="fa-solid fa-eye"></i></button><button class="icon-action" title="Change Password" onclick="changeStudentPassword('${s.id}')"><i class="fa-solid fa-key"></i></button><button class="icon-action" title="Reset Password to NandanRCM" onclick="resetStudentPassword('${s.id}')"><i class="fa-solid fa-rotate-left"></i></button><button class="icon-action" title="${stClass==="inactive"?"Activate Account":"Inactive Account"}" onclick="toggleStudentAccountStatus('${s.id}')"><i class="fa-solid ${stClass==="inactive"?"fa-user-check":"fa-user-xmark"}"></i></button><button class="icon-action red" title="Delete" onclick="deleteStudentRecord('${s.id}')"><i class="fa-solid fa-trash"></i></button></div></td></tr>`;
    });
    html+=`</tbody></table></div>`;
    area.innerHTML=html;
  }catch(err){area.innerHTML=`<p style="color:#ff7070;">${escapeHTML(err.message)}</p>`;}
}
async function viewStudentDetails(id){
  const doc=await db.collection("students").doc(id).get();
  if(!doc.exists){alert("Student not found.");return;}
  selectedStudentId=id;selectedStudentData=doc.data();
  document.getElementById("studentResult").innerHTML=`<div class="student-box"><div><h3>${escapeHTML(getStudentName(selectedStudentData))}</h3><p>Email: ${escapeHTML(selectedStudentData.email||"-")}</p><p>Mobile: ${escapeHTML(selectedStudentData.phone||selectedStudentData.mobile||"-")}</p><p>Date of Joining: ${formatDateValue(selectedStudentData.createdAt||selectedStudentData.dateOfJoining||selectedStudentData.joiningDate)}</p><p>Payment: ${escapeHTML(selectedStudentData.paymentStatus||"Pending")} | Status: ${escapeHTML(getStudentStatus(selectedStudentData))}</p></div><div class="btn-row"><button class="secondary-btn" onclick="renderAssignPanel()">Assign / Upload</button><button class="secondary-btn" onclick="openStudentProfilePanel()">Profile</button></div></div>`;

let adminAttendanceMonth=new Date().getMonth();

let adminAttendanceStudentId=null;
let adminAttendanceStudentName="";
let adminAttendanceMap={};

function adminAttendanceDateKey(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}

async function findAttendanceStudent(){
  const q=document.getElementById("attendanceStudentSearch").value.trim();
  const picker=document.getElementById("attendanceMonthPicker").value;
  if(picker){const [yy,mm]=picker.split("-").map(Number);adminAttendanceYear=yy;adminAttendanceMonth=mm-1;}
  if(!q){showMsg("attendanceMsg","Please enter student email or mobile number.","err");return;}
  showMsg("attendanceMsg","Searching student...","ok");
  try{
    let snap;
    if(q.includes("@")) snap=await db.collection("students").where("email","==",q).limit(1).get();
    else{
      snap=await db.collection("students").where("phone","==",q).limit(1).get();
      if(snap.empty) snap=await db.collection("students").where("mobile","==",q).limit(1).get();
    }
    if(snap.empty){adminAttendanceStudentId=null;document.getElementById("attendanceArea").innerHTML="No student found.";showMsg("attendanceMsg","No student found.","err");return;}
    const doc=snap.docs[0], d=doc.data();
    adminAttendanceStudentId=doc.id;
    adminAttendanceStudentName=(d.firstName||d.fullName||d.email||"Student")+" "+(d.lastName||"");
    document.getElementById("attendanceStudentTitle").textContent=`Attendance Details - ${adminAttendanceStudentName.trim()}`;
    showMsg("attendanceMsg","Student found. Attendance loaded ✅","ok");
    loadAdminAttendance();
  }catch(err){showMsg("attendanceMsg","Error: "+err.message,"err");}
}

function changeAdminAttendanceMonth(step){
  adminAttendanceMonth+=step;
  if(adminAttendanceMonth<0){adminAttendanceMonth=11;adminAttendanceYear--;}
  if(adminAttendanceMonth>11){adminAttendanceMonth=0;adminAttendanceYear++;}
  const picker=document.getElementById("attendanceMonthPicker");
  if(picker) picker.value=`${adminAttendanceYear}-${String(adminAttendanceMonth+1).padStart(2,"0")}`;
  if(adminAttendanceStudentId) loadAdminAttendance();
}

async function loadAdminAttendance(){
  const area=document.getElementById("attendanceArea");
  if(!adminAttendanceStudentId||!area)return;
  area.innerHTML="Loading attendance...";
  adminAttendanceMap={};
  const start=adminAttendanceDateKey(adminAttendanceYear,adminAttendanceMonth,1);
  const end=adminAttendanceDateKey(adminAttendanceYear,adminAttendanceMonth,new Date(adminAttendanceYear,adminAttendanceMonth+1,0).getDate());
  try{
    const snap=await db.collection("attendance").where("uid","==",adminAttendanceStudentId).get();
    snap.forEach(doc=>{const d=doc.data();if(d.date>=start&&d.date<=end)adminAttendanceMap[d.date]={id:doc.id,...d};});
    renderAdminAttendanceCalendar();
  }catch(err){area.innerHTML=`<span style="color:#ff7070;">${err.message}</span>`;}
}

function renderAdminAttendanceCalendar(){
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const daysInMonth=new Date(adminAttendanceYear,adminAttendanceMonth+1,0).getDate();
  const firstDay=new Date(adminAttendanceYear,adminAttendanceMonth,1).getDay();
  let present=0,absent=0;
  Object.values(adminAttendanceMap).forEach(v=>{if((v.status||"Present")==="Present")present++; if(v.status==="Absent")absent++;});
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;"><b>${monthNames[adminAttendanceMonth]} ${adminAttendanceYear}</b><span style="font-size:12px;color:rgba(255,255,255,.65);">Present: <b class="att-present">${present}</b> | Absent: <b class="att-absent">${absent}</b></span></div>`;
  html+=`<table class="table"><thead><tr><th>Date</th><th>Day</th><th>Status</th><th>Notes</th><th>Update / Modify</th></tr></thead><tbody>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=adminAttendanceDateKey(adminAttendanceYear,adminAttendanceMonth,d);
    const dt=new Date(adminAttendanceYear,adminAttendanceMonth,d);
    const rec=adminAttendanceMap[key]||{};
    const status=rec.status||"Unmarked";
    const cls=status==="Present"?"att-present":status==="Absent"?"att-absent":"att-unmarked";
    html+=`<tr><td>${key}</td><td>${dayNames[dt.getDay()]}</td><td class="${cls}">${status}</td><td>${escapeHTML(rec.notes||rec.updatedByAdmin||"-")}</td><td><button class="mini-btn gold" onclick="setAdminAttendance('${key}','Present')">Present</button><button class="mini-btn red" onclick="setAdminAttendance('${key}','Absent')">Absent</button><button class="mini-btn blue" onclick="clearAdminAttendance('${key}')">Clear</button></td></tr>`;
  }
  html+=`</tbody></table>`;
  document.getElementById("attendanceArea").innerHTML=html;
}

async function setAdminAttendance(dateKey,status){
  if(!adminAttendanceStudentId)return;
  const notes=prompt(`Optional notes for ${dateKey} (${status}):`, adminAttendanceMap[dateKey]?.notes||"");
  if(notes===null)return;
  try{
    await db.collection("attendance").doc(`${adminAttendanceStudentId}_${dateKey}`).set({
      uid:adminAttendanceStudentId,
      studentName:adminAttendanceStudentName.trim(),
      date:dateKey,
      status:status,
      notes:notes.trim(),
      updatedByAdmin:auth.currentUser.email||"",
      updatedByAdminAt:new Date().toISOString()
    },{merge:true});
    await db.collection("students").doc(adminAttendanceStudentId).set({classesAttended:firebase.firestore.FieldValue.increment(status==="Present"&&!adminAttendanceMap[dateKey]?1:0),updatedByAdminAt:new Date().toISOString()},{merge:true}).catch(()=>{});
    loadAdminAttendance();
  }catch(err){alert("Attendance update failed: "+err.message);}
}

async function clearAdminAttendance(dateKey){
  if(!adminAttendanceStudentId)return;
  if(!confirm("Clear attendance for "+dateKey+"?"))return;
  try{await db.collection("attendance").doc(`${adminAttendanceStudentId}_${dateKey}`).delete();loadAdminAttendance();}catch(err){alert("Clear failed: "+err.message);}
}

async function runBulkUpdate(){
  const target=document.getElementById("bulkTarget").value;
  showMsg("bulkMsg","Bulk update running...","ok");
  try{
    const snap=await db.collection("students").get();
    const batch=db.batch();
    let count=0;
    snap.forEach(doc=>{
      const d=doc.data();
      if(target==="paid"&&d.paymentStatus!=="Paid")return;
      if(target==="pending"&&d.paymentStatus==="Paid")return;
      const update={updatedByAdminAt:new Date().toISOString()};
      const enrolled=document.getElementById("bulkEnrolled").value;
      const classes=document.getElementById("bulkClasses").value;
      if(enrolled!=="")update.enrolledCourses=Number(enrolled);
      if(classes!=="")update.classesAttended=Number(classes);

      const bulkMap=[
        ["bulkLiveClasses","liveClasses","liveClassLink"],
        ["bulkWebinars","webinars","webinarText"],
        ["bulkInternships","internships","internshipText"],
        ["bulkDocuments","documents","documentText"],
        ["bulkMyCourses","myCourses","courseName"],
        ["bulkQuizzes","quizzes","quizLink"],
        ["bulkAssignments","assignments","assignmentText"],
        ["bulkJobPortal","jobPortal","jobPortalText"],
        ["bulkMockInterviews","mockInterviews","mockInterviewText"],
        ["bulkAiMockInterview","aiMockInterview","aiMockInterviewText"],
        ["bulkScheduleAccess","scheduleAccess","scheduleText"],
        ["bulkAnnouncements","announcements","announcementText"],
        ["bulkTrainerSupport","trainerSupport","trainerNotes"]
      ];

      bulkMap.forEach(([checkId,field,textField])=>{
        const checkbox=document.getElementById(checkId);
        const textInput=document.getElementById(checkId+"Text");
        if(checkbox&&checkbox.checked){
          update[field]=true;
          if(textInput)update[textField]=textInput.value.trim();
        }
      });

      batch.set(db.collection("students").doc(doc.id),update,{merge:true});
      count++;
    });
    await batch.commit();
    showMsg("bulkMsg",`Bulk update completed for ${count} students ✅`,"ok");
  }catch(err){showMsg("bulkMsg","Error: "+err.message,"err");}
}
async function openReports(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Reports","View student records and export to Excel.")}<div class="card"><div class="btn-row"><button class="primary-btn" onclick="loadReports()">Refresh Report</button><button class="secondary-btn" onclick="exportStudentsToExcel()">Export to Excel</button></div><div id="reportArea" style="margin-top:14px;">Loading...</div></div>`;loadReports();}
async function loadReports(){try{const snap=await db.collection("students").get();allStudentsCache=[];let html=`<table class="table"><thead><tr><th>Name</th><th>Email</th><th>Mobile</th><th>Courses</th><th>Classes</th><th>Payment</th><th>Certificate</th></tr></thead><tbody>`;snap.forEach(doc=>{const d=doc.data();allStudentsCache.push({id:doc.id,...d});html+=`<tr><td>${d.fullName||d.firstName||"Student"}</td><td>${d.email||"-"}</td><td>${d.phone||d.mobile||"-"}</td><td>${d.enrolledCourses||0}</td><td>${d.classesAttended||0}</td><td>${d.paymentStatus||"Pending"}</td><td>${d.certificateStatus||"Not Issued"}</td></tr>`;});html+=`</tbody></table>`;document.getElementById("reportArea").innerHTML=html;}catch(err){document.getElementById("reportArea").innerHTML=`<p style="color:#ff7070;">${err.message}</p>`;}}

    StudentID:s.id||"",
    FullName:s.fullName||"",
    FirstName:s.firstName||"",
    LastName:s.lastName||"",
    Email:s.email||"",
    Mobile:s.phone||s.mobile||"",
    Gender:s.gender||"",
    DOB:s.dob||"",
    Address:s.address||"",
    City:s.city||"",
    State:s.state||"",
    Country:s.country||"",
    EnrolledCourses:s.enrolledCourses||0,
    ClassesAttended:s.classesAttended||0,
    QuizzesAvailable:s.quizzesAvailable||0,
    CertificatesEarned:s.certificatesEarned||0,
    CourseName:s.courseName||"",
    CourseAccess:s.courseAccess?"Enabled":"Disabled",
    PaymentStatus:s.paymentStatus||"Pending",
    CertificateStatus:s.certificateStatus||"Not Issued",
    LiveClasses:s.liveClasses||false,
    LiveClassLink:s.liveClassLink||"",
    Webinars:s.webinars||false,
    WebinarText:s.webinarText||"",
    Internships:s.internships||false,
    InternshipText:s.internshipText||"",
    Documents:s.documents||false,
    DocumentText:s.documentText||"",
    MyCourses:s.myCourses||false,
    Quizzes:s.quizzes||false,
    QuizLink:s.quizLink||"",
    Assignments:s.assignments||false,
    AssignmentText:s.assignmentText||"",
    JobPortal:s.jobPortal||false,
    JobPortalText:s.jobPortalText||"",
    MockInterviews:s.mockInterviews||false,
    MockInterviewText:s.mockInterviewText||"",
    AIMockInterview:s.aiMockInterview||false,
    AIMockInterviewText:s.aiMockInterviewText||"",
    TrainerSupport:s.trainerSupport||false,
    TrainerNotes:s.trainerNotes||"",
    Schedule:s.scheduleAccess||false,
    ScheduleText:s.scheduleText||"",
    Tickets:s.tickets||false,
    TicketText:s.ticketText||"",
    ResumeBuilder:s.resumeBuilder||false,
    ResumeText:s.resumeText||"",
    Announcements:s.announcements||false,
    AnnouncementText:s.announcementText||"",
    LiveClassesFile:s.liveClassesFile||"",
    CertificateFile:s.certificateFile||"",
    QuizFile:s.quizFile||"",
    AssignmentFile:s.assignmentFile||"",
    ScheduleFile:s.scheduleFile||"",
    ResumeFile:s.resumeFile||"",
    CreatedAt:s.createdAt||"",
    UpdatedAt:s.updatedAt||"",
    UpdatedByAdminAt:s.updatedByAdminAt||""
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  ws["!cols"]=Object.keys(rows[0]||{}).map(()=>({wch:22}));
  XLSX.utils.book_append_sheet(wb,ws,"Students A-Z");
  XLSX.writeFile(wb,"Nandan_RCM_Students_A_to_Z_Report.xlsx");
}
function openPayments(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Payments","View and update student payment status.")}<div class="card"><button class="primary-btn" onclick="loadPayments()">Refresh Payments</button><div id="paymentsArea" style="margin-top:14px;">Loading...</div></div>`;loadPayments();}
async function loadPayments(){
  try{
    const snap=await db.collection("students").get();
    let html=`<table class="table"><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Access</th><th>Actions</th></tr></thead><tbody>`;
    snap.forEach(doc=>{
      const d=doc.data();
      html+=`<tr><td>${d.fullName||d.firstName||"Student"}</td><td>${d.email||"-"}</td><td>${d.paymentStatus||"Pending"}</td><td>${d.courseAccess?"Enabled":"Disabled"}</td><td><div class="btn-row"><button class="secondary-btn" onclick="markStudentPaid('${doc.id}')">Paid</button><button class="danger-btn" onclick="markStudentNotPaid('${doc.id}')">Not Paid</button><button class="danger-btn" onclick="markStudentFailed('${doc.id}')">Failed</button></div></td></tr>`;
    });
    html+=`</tbody></table>`;
    document.getElementById("paymentsArea").innerHTML=html;
  }catch(err){document.getElementById("paymentsArea").innerHTML=err.message;}
}
async function markStudentPaid(id){await db.collection("students").doc(id).set({paymentStatus:"Paid",courseAccess:true,enrolledCourses:1,updatedByAdminAt:new Date().toISOString()},{merge:true});loadPayments();}

async function markStudentNotPaid(id){
  await db.collection("students").doc(id).set({paymentStatus:"Pending",courseAccess:false,enrolledCourses:0,updatedByAdminAt:new Date().toISOString()},{merge:true});
  loadPayments();
}

async function markStudentFailed(id){
  await db.collection("students").doc(id).set({paymentStatus:"Failed",courseAccess:false,updatedByAdminAt:new Date().toISOString()},{merge:true});
  loadPayments();
}

function openTickets(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Support Tickets","Create and manage support tickets.")}<div class="card"><h2 class="section-title">Create Ticket</h2><div id="ticketMsg" class="msg"></div><div class="grid-2"><div class="input-box"><label>Student Email</label><input id="ticketEmail" placeholder="student@email.com"></div><div class="input-box"><label>Priority</label><select id="ticketPriority"><option>Normal</option><option>High</option><option>Urgent</option></select></div></div><div class="input-box"><label>Ticket Details</label><textarea id="ticketText" placeholder="Issue details"></textarea></div><button class="primary-btn" onclick="createTicket()">Create Ticket</button></div><div class="card"><button class="secondary-btn" onclick="loadTickets()">Refresh Tickets</button><div id="ticketsArea" style="margin-top:14px;">Loading...</div></div>`;loadTickets();}
async function createTicket(){try{await db.collection("tickets").add({email:document.getElementById("ticketEmail").value.trim(),priority:document.getElementById("ticketPriority").value,message:document.getElementById("ticketText").value.trim(),status:"Open",createdAt:new Date().toISOString(),createdBy:auth.currentUser.email});showMsg("ticketMsg","Ticket created ✅","ok");loadTickets();}catch(err){showMsg("ticketMsg","Error: "+err.message,"err");}}
async function loadTickets(){try{const snap=await db.collection("tickets").orderBy("createdAt","desc").limit(80).get().catch(()=>db.collection("tickets").limit(80).get());if(snap.empty){document.getElementById("ticketsArea").innerHTML="No tickets found.";return;}let html=`<table class="table"><thead><tr><th>Email</th><th>Priority</th><th>Message</th><th>Latest Reply</th><th>Status</th><th>Action</th></tr></thead><tbody>`;snap.forEach(doc=>{const t=doc.data();html+=`<tr><td>${escapeHTML(t.email||"-")}</td><td>${escapeHTML(t.priority||"-")}</td><td>${escapeHTML(t.message||t.details||"-")}</td><td>${escapeHTML(t.lastAdminReply||t.lastReplyText||"-")}</td><td>${escapeHTML(t.status||"Open")}</td><td><button class="mini-btn blue" onclick="replyTicket('${doc.id}')">Reply</button><button class="mini-btn gold" onclick="resolveTicket('${doc.id}')">Resolve</button><button class="mini-btn red" onclick="deleteTicket('${doc.id}')">Delete</button></td></tr>`;});html+=`</tbody></table>`;document.getElementById("ticketsArea").innerHTML=html;}catch(err){document.getElementById("ticketsArea").innerHTML=err.message;}}
async function replyTicket(id){const reply=prompt("Type reply for this ticket:");if(reply===null)return;const msg=reply.trim();if(!msg){alert("Reply cannot be empty.");return;}try{await db.collection("tickets").doc(id).collection("replies").add({senderRole:"admin",email:auth.currentUser.email||"",message:msg,createdAt:new Date().toISOString()});await db.collection("tickets").doc(id).set({status:"In Progress",lastReplyBy:"admin",lastAdminReply:msg,lastReplyText:msg,repliedAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{merge:true});loadTickets();alert("Reply sent ✅");}catch(err){alert("Reply failed: "+err.message);}}
async function resolveTicket(id){await db.collection("tickets").doc(id).set({status:"Resolved",resolvedAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{merge:true});loadTickets();}
async function deleteTicket(id){if(!confirm("Delete this old ticket? This action cannot be undone."))return;try{const replies=await db.collection("tickets").doc(id).collection("replies").get().catch(()=>({empty:true,forEach:()=>{}}));const batch=db.batch();replies.forEach(r=>batch.delete(r.ref));batch.delete(db.collection("tickets").doc(id));await batch.commit();loadTickets();}catch(err){alert("Delete failed: "+err.message);}}

function openAnnouncements(el){setActive(el);document.getElementById("mainContent").innerHTML=`${topbar("Announcements","Send announcement to all students.")}<div class="card"><div id="annMsg" class="msg"></div><div class="input-box"><label>Title</label><input id="annTitle" placeholder="Announcement title"></div><div class="input-box"><label>Message</label><textarea id="annText" placeholder="Announcement message"></textarea></div><button class="primary-btn" onclick="sendAnnouncementToAll()">Send to All Students</button></div>`;}
async function sendAnnouncementToAll(){try{const title=document.getElementById("annTitle").value.trim(),text=document.getElementById("annText").value.trim();await db.collection("announcements").add({title,message:text,target:"all",createdAt:new Date().toISOString(),createdBy:auth.currentUser.email});const snap=await db.collection("students").get();const batch=db.batch();snap.forEach(doc=>{batch.set(db.collection("students").doc(doc.id),{announcements:true,announcementText:title+" - "+text,updatedByAdminAt:new Date().toISOString()},{merge:true});});await batch.commit();showMsg("annMsg","Announcement sent to all students ✅","ok");}catch(err){showMsg("annMsg","Error: "+err.message,"err");}}
function openAdminManagement(el){
  setActive(el);
  document.getElementById("mainContent").innerHTML=`
    ${topbar("Admin Management","Make admin, remove admin, and view admin list.")}
    <div class="card">
      <h2 class="section-title">Add / Remove Admin</h2>
      <div id="adminMsg" class="msg"></div>
      <div class="input-box">
        <label>Email Address</label>
        <input type="email" id="adminEmail" placeholder="Enter registered user email">
      </div>
      <div class="btn-row">
        <button class="primary-btn" onclick="makeAdmin()">Make Admin</button>
        <button class="danger-btn" onclick="removeAdmin()">Remove Admin</button>
        <button class="secondary-btn" onclick="loadAdminList()">Refresh Admin List</button>
      </div>
      <p class="small-note">User must signup first. Super admin emails cannot be removed from this page.</p>
    </div>

    <div class="card">
      <h2 class="section-title">Admin List</h2>
      <div id="adminListArea">Loading...</div>
    </div>
  `;
  loadAdminList();
}
async function makeAdmin(){const email=document.getElementById("adminEmail").value.trim().toLowerCase();if(!email){showMsg("adminMsg","Enter email.","err");return;}try{const userSnap=await db.collection("students").where("email","==",email).limit(1).get();if(userSnap.empty){showMsg("adminMsg","User not found. User must signup first.","err");return;}const userDoc=userSnap.docs[0];await db.collection("admins").doc(userDoc.id).set({email,role:"admin",createdBy:auth.currentUser.email,createdAt:new Date().toISOString()});showMsg("adminMsg","Admin created successfully ✅","ok");}catch(err){showMsg("adminMsg","Error: "+err.message,"err");}}

async function removeAdmin(){
  const email=document.getElementById("adminEmail").value.trim().toLowerCase();
  if(!email){showMsg("adminMsg","Enter email to remove.","err");return;}
  if(superAdmins.includes(email)){showMsg("adminMsg","This is a permanent Super Admin and cannot be removed here.","err");return;}
  try{
    const adminSnap=await db.collection("admins").where("email","==",email).limit(1).get();
    if(adminSnap.empty){showMsg("adminMsg","Admin not found.","err");return;}
    await db.collection("admins").doc(adminSnap.docs[0].id).delete();
    showMsg("adminMsg","Admin removed successfully ✅","ok");
    loadAdminList();
  }catch(err){showMsg("adminMsg","Error: "+err.message,"err");}
}

async function loadAdminList(){
  const area=document.getElementById("adminListArea");
  if(!area)return;
  try{
    let html=`<div class="admin-list-card"><div><b>Permanent Super Admins</b><p>${superAdmins.join("<br>")}</p></div><span class="small-note">Protected</span></div>`;
    const snap=await db.collection("admins").get();
    if(snap.empty){
      html+=`<p class="small-note" style="margin-top:12px;">No additional admins created yet.</p>`;
      area.innerHTML=html;
      return;
    }
    snap.forEach(doc=>{
      const a=doc.data();
      html+=`<div class="admin-list-card"><div><b>${a.email||"-"}</b><p>Role: ${a.role||"admin"} | Created by: ${a.createdBy||"-"}</p></div><button class="danger-btn" onclick="removeAdminById('${doc.id}','${a.email||""}')">Remove</button></div>`;
    });
    area.innerHTML=html;
  }catch(err){area.innerHTML=`<p style="color:#ff7070;">${err.message}</p>`;}
}

async function removeAdminById(id,email){
  if(superAdmins.includes((email||"").toLowerCase())){alert("Super Admin cannot be removed.");return;}
  if(!confirm("Remove admin access for "+email+"?"))return;
  await db.collection("admins").doc(id).delete();
  loadAdminList();
}

function openMyProfile(el){
  setActive(el);
  const user=auth.currentUser;
  document.getElementById("mainContent").innerHTML=`
    ${topbar("My Profile","Admin account details and password change.")}
    <div class="profile-card">
      <h3>Admin Profile</h3>
      <p>Email: ${user?.email||"-"}</p>
      <p style="margin-top:8px;color:rgba(255,255,255,.65);">Role: ${superAdmins.includes((user?.email||"").toLowerCase())?"Super Admin":"Admin"}</p>
    </div>
    <div class="profile-card">
      <h3>Change Password</h3>
      <div id="profileMsg" class="msg"></div>
      <div class="input-box"><label>New Password</label><input type="password" id="newAdminPassword" placeholder="Enter new password"></div>
      <div class="input-box"><label>Confirm Password</label><input type="password" id="confirmAdminPassword" placeholder="Confirm password"></div>
      <button class="primary-btn" onclick="changeAdminPassword()">Change Password</button>
      <p class="small-note">If Firebase asks for recent login, logout and login again, then change password.</p>
    </div>`;
}

async function changeAdminPassword(){
  const p=document.getElementById("newAdminPassword").value;
  const c=document.getElementById("confirmAdminPassword").value;
  if(!p){showMsg("profileMsg","Please enter new password.","err");return;}
  if(p.length<6){showMsg("profileMsg","Password must be at least 6 characters.","err");return;}
  if(p!==c){showMsg("profileMsg","Passwords do not match.","err");return;}
  try{
    await auth.currentUser.updatePassword(p);
    document.getElementById("newAdminPassword").value="";
    document.getElementById("confirmAdminPassword").value="";
    showMsg("profileMsg","Password changed successfully ✅","ok");
  }catch(err){showMsg("profileMsg","Error: "+err.message,"err");}
}

function logout(){auth.signOut().then(()=>window.location.href="login.html");}
